# =============================================================================
# Multimodal Medical Diagnosis System — Central Configuration
# =============================================================================
# Edit this file to change hyperparameters without touching source code.
# Used by scripts/train_nih.py (nih section) and run_train.py (reflacx section).
# =============================================================================

# ---------------------------------------------------------------------------
# NIH ChestX-ray14 image-only training (scripts/train_nih.py)
# ---------------------------------------------------------------------------
nih:
  data_dir: "./data/nih_chest_xray"
  train_csv: "./cxr_code/data/train.csv"
  valid_csv: "./cxr_code/data/valid.csv"

  # Training
  batch_size: 32            # 64 → OOM on 4 GB VRAM; 32 fits safely
  num_epochs: 10            # More epochs to compensate for smaller batch
  lr: 0.0001                # Scaled up slightly for batch 32 (linear scaling rule)
  weight_decay: 0.0001
  seed: 123

  # Model
  num_classes: 5
  label_names:
    - Atelectasis
    - Cardiomegaly
    - Consolidation
    - Edema
    - Effusion

  # Loss
  pos_weight: 5.0

  # LR scheduler
  scheduler_step_size: 7    # Was 15 — never fired in 10 epochs! Now fires at ep 7 & 14
  scheduler_gamma: 0.7

  # DataLoader
  num_workers: 4            # i5-14400F has 10 cores — 1 worker starves the GPU
  pin_memory: true          # Faster CPU→GPU transfers
  persistent_workers: true  # Avoid re-spawning workers each epoch            # CPU training (no multiprocessing)

# ---------------------------------------------------------------------------
# REFLACX multimodal training (run_train.py)
# ---------------------------------------------------------------------------
reflacx:
  # Training
  batch_size: 16
  num_epochs: 10
  lr: 0.0001
  weight_decay: 0.00001
  seed: 123

  # Dataset split
  training_portion: 0.8
  test_portion: 0.1

  # Model architecture
  image_size: 256
  model_dim: 32
  embedding_dim: 64
  dropout: 0.2
  pretrained: true
  detach_image: false
  use_clinical: true
  use_image: true

  # Early stopping
  early_stop_count: 5

  # LR scheduler (ReduceLROnPlateau)
  scheduler_patience: 2
  scheduler_threshold: 0.001
  scheduler_factor: 0.5
