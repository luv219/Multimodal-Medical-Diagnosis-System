# =============================================================================
# Multimodal Medical Diagnosis System — Central Configuration
# =============================================================================
# Edit this file to change hyperparameters without touching source code.
# Used by scripts/train_nih.py (nih section) and run_train.py (reflacx section).
# =============================================================================

# ---------------------------------------------------------------------------
# NIH ChestX-ray14 image-only training (scripts/train_nih.py)
# ---------------------------------------------------------------------------
nih:
  data_dir: "./data/nih_chest_xray"
  train_csv: "./cxr_code/data/train.csv"
  valid_csv: "./cxr_code/data/valid.csv"

  batch_size: 16           # Halved — leaves VRAM headroom for desktop use
  num_epochs: 15           # Increased to compensate for smaller batch
  lr: 0.00007              # Scaled with batch (linear scaling rule)
  weight_decay: 0.0001
  seed: 123

  num_classes: 5
  label_names:
    - Atelectasis
    - Cardiomegaly
    - Consolidation
    - Edema
    - Effusion

  pos_weight: 5.0

  scheduler_step_size: 10  # Fires at ep 10 — one clean decay before end
  scheduler_gamma: 0.7

  num_workers: 2            # Frees ~2 cores for foreground work
  prefetch_factor: 2        # Pre-loads 2 batches per worker — smooths GPU stalls
  pin_memory: true
  persistent_workers: true

reflacx:
  batch_size: 8            # 256px multimodal — 8 is safe on 4 GB VRAM
  num_epochs: 15
  lr: 0.00005              # Scaled with batch (0.0001 × 8/16)
  weight_decay: 0.00001
  seed: 123

  training_portion: 0.8
  test_portion: 0.1

  image_size: 256
  model_dim: 32
  embedding_dim: 64
  dropout: 0.2
  pretrained: true
  detach_image: false
  use_clinical: true
  use_image: true

  early_stop_count: 7      # Extra patience to match longer run
  scheduler_patience: 3
  scheduler_threshold: 0.001
  scheduler_factor: 0.5
